name: Elixir CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  LOCALIZE_DEFAULT_LOCALE: en

permissions:
  contents: read

jobs:
  # Download the JPL DE440s ephemeris (~32 MB) once and cache it, instead of
  # having every matrix entry race to fetch it. ex_tempo depends on astro (via
  # calendrical), which needs this file at compile time (to compute Persian era
  # boundaries). NAIF's server is slow and periodically unreachable, so isolating
  # the network access to this single job means an outage fails only this cheap
  # job (just re-run it) rather than poisoning the whole matrix.
  ephemeris:
    name: Prime JPL ephemeris cache
    runs-on: ubuntu-latest
    steps:
      - name: Cache JPL ephemeris
        id: cache-ephemeris
        uses: actions/cache@v5
        with:
          path: ~/.cache/astro
          key: astro-ephemeris-de440s

      - name: Download ephemeris
        if: steps.cache-ephemeris.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/astro
          url="https://naif.jpl.nasa.gov/pub/naif/generic_kernels/spk/planets/de440s.bsp"
          # NAIF advertises TLS 1.3 but its handshake is broken, so cap at 1.2 —
          # the version it can actually negotiate. --connect-timeout keeps a dead
          # window from burning the full TCP timeout on every attempt.
          for i in 1 2 3 4 5; do
            if curl --fail --location --tls-max 1.2 --connect-timeout 30 \
                    --output ~/.cache/astro/de440s.bsp "$url"; then
              exit 0
            fi
            echo "Ephemeris download attempt $i failed; retrying in 20s..."
            sleep 20
          done
          echo "Ephemeris download failed after 5 attempts" >&2
          exit 1

  test:
    needs: ephemeris
    name: "Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}${{ matrix.lint && ' (lint)' || '' }}"
    runs-on: ubuntu-latest

    # tempo_sql's test suite drops, creates, and migrates a real database
    # (see the `test` alias in mix.exs), so CI needs a live PostgreSQL. The
    # connection reads PGUSER/PGPASSWORD/PGHOST (see config/test.exs).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost

    strategy:
      fail-fast: false
      matrix:
        include:
          # Elixir 1.17 — supports OTP 25–27
          - elixir: "1.17-otp-26"
            otp: "26"
          - elixir: "1.17-otp-27"
            otp: "27"

          # Elixir 1.18 — supports OTP 25–27
          - elixir: "1.18-otp-26"
            otp: "26"
          - elixir: "1.18-otp-27"
            otp: "27"

          # Elixir 1.19 — supports OTP 26–28
          - elixir: "1.19-otp-26"
            otp: "26"
          - elixir: "1.19-otp-27"
            otp: "27"
          - elixir: "1.19-otp-28"
            otp: "28"

          # Elixir 1.20 — supports OTP 27–29
          - elixir: "1.20.2-otp-27"
            otp: "27"
          - elixir: "1.20.2-otp-28"
            otp: "28"
          - elixir: "1.20.2-otp-29"
            otp: "29"
            lint: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependency cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      # Restore the ephemeris primed by the `ephemeris` job above. astro's
      # resolver reads it from `:filename.basedir(:user_cache, "astro")`
      # (~/.cache/astro on Linux), so compile finds it with no extra config.
      - name: Restore JPL ephemeris
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/astro
          key: astro-ephemeris-de440s
          fail-on-cache-miss: true

      - name: Check formatting
        if: matrix.lint
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        if: matrix.lint
        run: mix credo --strict

      - name: Run tests
        run: mix test

      - name: Restore PLT cache
        if: matrix.lint
        uses: actions/cache@v5
        with:
          path: _build/dev/dialyxir_*
          key: plt-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plt-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Run dialyzer
        if: matrix.lint
        env:
          MIX_ENV: dev
        run: mix dialyzer
